[tools]
rust = "1.95.0"

[tasks.fmt]
description = "Check Rust formatting"
run = "cargo fmt --all -- --check"

[tasks.clippy]
description = "Run clippy with CI warning policy"
env = { RUSTFLAGS = "-D warnings" }
run = "cargo clippy --workspace --all-targets -- -D warnings"

[tasks.test]
description = "Run the full workspace test suite"
env = { RUSTFLAGS = "-D warnings" }
run = "cargo test --workspace --all-targets"

[tasks.ci]
description = "Run the same checks as GitHub Actions"
run = [
  { task = "fmt" },
  { task = "clippy" },
  { task = "test" },
]

[tasks.build]
description = "Build the release binary"
run = "cargo build --release -p switchbard-gui"

[tasks.bundle]
description = "Build the alpha macOS app bundle"
run = "bash scripts/bundle-mac.sh"

[tasks.package]
description = "Build an alpha macOS DMG and checksum"
depends = ["ci"]
run = "bash scripts/package-dmg.sh"
