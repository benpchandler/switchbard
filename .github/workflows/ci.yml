name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: mise run ${{ matrix.task }}
    # Switchbard is macOS-only. If we ever port to Linux, add ubuntu-latest here.
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        task: [test, clippy, fmt]
    steps:
      - uses: actions/checkout@v4

      - name: Install mise tools
        uses: jdx/mise-action@v4

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.task }}-${{ hashFiles('mise.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.task }}-

      - name: Run task — ${{ matrix.task }}
        run: mise run ${{ matrix.task }}
