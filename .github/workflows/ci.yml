name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  ci:
    name: cargo ${{ matrix.task }}
    # Hive is macOS-only. If we ever port to Linux, add ubuntu-latest here.
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        task: [test, clippy, fmt]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.task }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.task }}-

      - name: Run task — test
        if: matrix.task == 'test'
        run: cargo test --workspace --all-targets

      - name: Run task — clippy
        if: matrix.task == 'clippy'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run task — fmt
        if: matrix.task == 'fmt'
        run: cargo fmt --all -- --check
